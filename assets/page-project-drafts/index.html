<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LettersGR - Learn Greek</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <style>
        :root {
            --sat: env(safe-area-inset-top);
            --sar: env(safe-area-inset-right);
            --sab: env(safe-area-inset-bottom);
            --sal: env(safe-area-inset-left);
        }
        body {
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: none;
            background-color: white;
            color: #002B5B;
            margin: 0;
            padding: 0;
        }
        .safe-pb { padding-bottom: var(--sab); }
        .safe-pt { padding-top: var(--sat); }
        
        /* Smooth transitions */
        .fade-enter { opacity: 0; }
        .fade-enter-active { opacity: 1; transition: opacity 0.2s ease-out; }

        /* iOS Liquid Glass Effect */
        .liquid-glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 14px 0 rgba(0, 0, 0, 0.05);
        }
        
        .liquid-glass-dark {
            background: rgba(0, 43, 91, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 43, 91, 0.1);
        }

        .liquid-glass-overlay {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .liquid-glass-blue {
            background: rgba(0, 122, 204, 0.78);
            backdrop-filter: blur(20px) saturate(160%);
            -webkit-backdrop-filter: blur(20px) saturate(160%);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 10px 30px -10px rgba(0, 122, 204, 0.4), inset 0 1px 1px rgba(255, 255, 255, 0.25);
        }

        @keyframes bounce-soft {
          0%, 100% { transform: translateY(0); }
          50% { transform: translateY(-8px); }
        }
        .animate-bounce-soft {
          animation: bounce-soft 3s ease-in-out infinite;
        }

        @keyframes glow-pulse {
          0% { 
            filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.3)); 
            opacity: 0.85; 
            transform: scale(1);
          }
          50% { 
            filter: drop-shadow(0 0 24px rgba(255, 255, 255, 0.7)); 
            opacity: 1; 
            transform: scale(1.1);
          }
          100% { 
            filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.3)); 
            opacity: 0.85; 
            transform: scale(1);
          }
        }
        .animate-glow-pulse {
          animation: glow-pulse 4s ease-in-out infinite;
        }

        /* Test Results Specific Animations */
        @keyframes laurel-zoom {
          0%, 100% { transform: scale(1); opacity: 0.8; }
          50% { transform: scale(1.08); opacity: 1; }
        }
        .animate-laurel-zoom {
          animation: laurel-zoom 4s ease-in-out infinite;
        }

        @keyframes bounce-high-score {
          0%, 100% { transform: translateY(0); }
          50% { transform: translateY(-5px); }
        }
        .animate-bounce-high-score {
          animation: bounce-high-score 2s ease-in-out infinite;
        }

        /* Intro Transition Animations - Refined for smoothness, now slowed by 1.5x */
        @keyframes intro-crossfade {
          0% { opacity: 1; }
          45% { opacity: 1; }
          100% { opacity: 0; }
        }
        @keyframes intro-text-zoom {
          0% { transform: scale(1); }
          100% { transform: scale(1.06); }
        }
        .animate-intro-crossfade {
          animation: intro-crossfade 2.7s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
        .animate-intro-text {
          animation: intro-text-zoom 2.7s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        /* Orientation Blocker Styles */
        #orientation-blocker {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 9999;
            background-color: #002B5B;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2.5rem;
            color: white;
        }

        /* Trigger blocker only on handheld devices/tablets when in landscape */
        @media screen and (orientation: landscape) and (max-width: 1024px) {
            #orientation-blocker {
                display: flex;
            }
            #root {
                display: none;
            }
            body {
                overflow: hidden;
                background-color: #002B5B;
            }
        }

        .rotate-icon {
            animation: rotate-device 4s ease-in-out infinite;
            color: rgba(255, 255, 255, 0.9);
        }

        @keyframes rotate-device {
            0% { transform: rotate(0deg); }
            15% { transform: rotate(0deg); }
            40% { transform: rotate(90deg); }
            60% { transform: rotate(90deg); }
            85% { transform: rotate(0deg); }
            100% { transform: rotate(0deg); }
        }
    </style>
    <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@19.0.0",
    "react-dom": "https://esm.sh/react-dom@19.0.0",
    "react-dom/client": "https://esm.sh/react-dom@19.0.0/client",
    "lucide-react": "https://esm.sh/lucide-react@0.463.0",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "firebase/": "https://esm.sh/firebase@^12.9.0/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body class="antialiased">
    <!-- Orientation Blocker UI -->
    <div id="orientation-blocker" aria-hidden="true">
        <div class="rotate-icon mb-10">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <rect x="5" y="2" width="14" height="20" rx="2" ry="2" />
                <path d="M12 18h.01" />
            </svg>
        </div>
        <h2 class="text-[32px] font-light leading-tight tracking-tight mb-4">Please rotate your device<br/>or lock screen rotation</h2>
        <p class="text-white text-[18px] font-light leading-snug">LettersGR is currently<br/>in portrait orientation only.</p>
    </div>

    <div id="root"></div>
    <script type="module" src="index.tsx"></script>
<script type="module" src="/index.tsx"></script>
</body>
</html>
